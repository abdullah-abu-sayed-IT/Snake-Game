<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungry Sam! 🍕</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #a8edea, #fed6e3);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  /* Floating background shapes */
  .bg-shape {
    position: fixed;
    border-radius: 50%;
    opacity: 0.15;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
  }
  .bg-shape:nth-child(1) { width:200px;height:200px;background:#ff6b6b;top:-50px;left:-50px;animation-delay:0s; }
  .bg-shape:nth-child(2) { width:150px;height:150px;background:#ffd93d;bottom:-30px;right:10%;animation-delay:1s; }
  .bg-shape:nth-child(3) { width:100px;height:100px;background:#6bcb77;top:20%;right:-30px;animation-delay:2s; }
  .bg-shape:nth-child(4) { width:120px;height:120px;background:#4d96ff;bottom:20%;left:-30px;animation-delay:3s; }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 3px 3px 0 #ff6b6b, 6px 6px 0 rgba(0,0,0,0.1);
    margin-bottom: 0.5rem;
    animation: bounce-title 2s ease-in-out infinite;
  }

  @keyframes bounce-title {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  #hud {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1rem;
  }

  .hud-box {
    background: white;
    border-radius: 20px;
    padding: 0.4rem 1.2rem;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    font-size: 1.1rem;
    font-weight: 800;
    color: #555;
  }

  .hud-box span { color: #ff6b6b; font-size: 1.3rem; }

  #game-wrapper {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2), 0 0 0 6px white;
  }

  canvas {
    display: block;
    background: #fff9f0;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.92);
    gap: 1rem;
    border-radius: 24px;
  }

  #overlay .emoji-big {
    font-size: 5rem;
    animation: wiggle 1s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%,100% { transform: rotate(-10deg); }
    50% { transform: rotate(10deg); }
  }

  #overlay h2 {
    font-size: 2.2rem;
    font-weight: 900;
    color: #ff6b6b;
  }

  #overlay p {
    font-size: 1rem;
    color: #888;
    font-weight: 700;
    text-align: center;
    padding: 0 1rem;
  }

  button {
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    padding: 0.8rem 2.5rem;
    cursor: pointer;
    box-shadow: 0 6px 0 #cc4444;
    transition: all 0.1s;
    letter-spacing: 0.05em;
  }

  button:hover { transform: translateY(2px); box-shadow: 0 4px 0 #cc4444; }
  button:active { transform: translateY(5px); box-shadow: 0 1px 0 #cc4444; }

  #controls {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .key {
    background: white;
    border-radius: 10px;
    padding: 0.3rem 0.7rem;
    font-size: 1.1rem;
    box-shadow: 0 3px 0 rgba(0,0,0,0.15);
    font-weight: 800;
    color: #555;
  }

  #message {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffd93d;
    border-radius: 30px;
    padding: 0.4rem 1.5rem;
    font-size: 1.2rem;
    font-weight: 900;
    color: #333;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  #message.show { opacity: 1; }

  /* Arrow buttons for mobile */
  #arrow-btns {
    margin-top: 1rem;
    display: grid;
    grid-template-columns: repeat(3, 55px);
    grid-template-rows: repeat(2, 55px);
    gap: 6px;
  }

  .arrow-btn {
    width: 55px; height: 55px;
    background: white;
    border: none;
    border-radius: 14px;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
    color: #555;
  }
  .arrow-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  #btn-up { grid-column: 2; grid-row: 1; }
  #btn-left { grid-column: 1; grid-row: 2; }
  #btn-down { grid-column: 2; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>

<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<h1>🍕 Hungry Sam!</h1>

<div id="hud">
  <div class="hud-box">⭐ Score: <span id="score">0</span></div>
  <div class="hud-box">🏆 Best: <span id="high">0</span></div>
</div>

<div id="game-wrapper">
  <canvas id="c"></canvas>
  <div id="message" id="msg"></div>

  <div id="overlay">
    <div class="emoji-big">🧑</div>
    <h2>Hungry Sam!</h2>
    <p>Help Sam eat all the yummy food!<br>Use the arrow keys or buttons below 🎮</p>
    <button id="btn">▶ LET'S PLAY!</button>
  </div>
</div>

<div id="arrow-btns">
  <button class="arrow-btn" id="btn-up">⬆️</button>
  <button class="arrow-btn" id="btn-left">⬅️</button>
  <button class="arrow-btn" id="btn-down">⬇️</button>
  <button class="arrow-btn" id="btn-right">➡️</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const btn = document.getElementById('btn');
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('high');
const msgEl = document.getElementById('message');

// Responsive size
const SIZE = Math.min(window.innerWidth - 40, 400);
const CELL = Math.floor(SIZE / 20);
const COLS = 20, ROWS = 20;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

const FOODS = ['🍕','🍎','🍰','🍩','🍌','🍓','🍔','🌮','🧁','🍦'];
const MESSAGES = ['Yummy! 😋','Delicious! 🤤','Nom nom! 😄','Great! 🎉','Awesome! ⭐','So good! 🌟'];

let snake, dir, nextDir, food, foodEmoji, score, highScore=0, gameLoop, running, mouthOpen, frameCount;

function showMsg(text) {
  msgEl.textContent = text;
  msgEl.classList.add('show');
  setTimeout(() => msgEl.classList.remove('show'), 1200);
}

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  running = true;
  mouthOpen = true;
  frameCount = 0;
  scoreEl.textContent = 0;
  overlay.style.display = 'none';
  spawnFood();
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, 180);
}

function spawnFood() {
  do {
    food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===food.x && s.y===food.y));
  foodEmoji = FOODS[Math.floor(Math.random()*FOODS.length)];
}

function tick() {
  frameCount++;
  mouthOpen = (frameCount % 6 < 3);
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    if (score > highScore) { highScore = score; highEl.textContent = highScore; }
    showMsg(MESSAGES[Math.floor(Math.random()*MESSAGES.length)]);
    spawnFood();
    // Bounce the score
    scoreEl.style.transform = 'scale(1.5)';
    setTimeout(() => scoreEl.style.transform = 'scale(1)', 200);
  } else {
    snake.pop();
  }
  draw();
}

function drawRoundRect(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();
}

function draw() {
  // Background with checkerboard
  for (let x=0; x<COLS; x++) {
    for (let y=0; y<ROWS; y++) {
      ctx.fillStyle = (x+y)%2===0 ? '#fff9f0' : '#fff3e0';
      ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
    }
  }

  // Food
  ctx.font = `${CELL-4}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(foodEmoji, food.x*CELL + CELL/2, food.y*CELL + CELL/2 + 1);

  // Body segments (body = colorful blocks)
  for (let i = snake.length-1; i >= 1; i--) {
    const seg = snake[i];
    const x = seg.x * CELL, y = seg.y * CELL;
    const colors = ['#4ecdc4','#45b7d1','#96ceb4','#88d8a3'];
    const c = colors[i % colors.length];
    drawRoundRect(x+2, y+2, CELL-4, CELL-4, 6, c);

    // Little shirt/body detail
    if (i === 1) {
      // Torso - draw a shirt
      drawRoundRect(x+2, y+2, CELL-4, CELL-4, 6, '#ff6b6b');
      // shirt buttons
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(x+CELL/2, y+CELL/2-3, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x+CELL/2, y+CELL/2+3, 2, 0, Math.PI*2);
      ctx.fill();
    } else if (i >= 2) {
      // legs/pants
      drawRoundRect(x+2, y+2, CELL-4, CELL-4, 6, '#4d96ff');
    }
  }

  // Draw head (human face!)
  const head = snake[0];
  const hx = head.x * CELL, hy = head.y * CELL;
  const cx = hx + CELL/2, cy = hy + CELL/2;
  const r = CELL/2 - 1;

  // Head skin
  ctx.fillStyle = '#ffd5a8';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();

  // Hair - direction-based
  ctx.fillStyle = '#8B4513';
  if (dir.x === 1) { // facing right
    ctx.fillRect(hx+1, hy+1, CELL*0.5, CELL*0.35);
  } else if (dir.x === -1) { // facing left
    ctx.fillRect(hx+CELL*0.5, hy+1, CELL*0.5-1, CELL*0.35);
  } else if (dir.y === -1) { // facing up
    ctx.fillRect(hx+2, hy+1, CELL-4, CELL*0.4);
  } else { // facing down - back of head
    ctx.fillRect(hx+2, hy+CELL*0.6, CELL-4, CELL*0.35);
  }

  // Eyes
  ctx.fillStyle = 'white';
  // Determine eye positions based on direction
  let eye1, eye2;
  if (dir.x === 1) { eye1={x:cx+2,y:cy-4}; eye2={x:cx+2,y:cy+4}; }
  else if (dir.x === -1) { eye1={x:cx-2,y:cy-4}; eye2={x:cx-2,y:cy+4}; }
  else if (dir.y === -1) { eye1={x:cx-4,y:cy-2}; eye2={x:cx+4,y:cy-2}; }
  else { eye1={x:cx-4,y:cy+3}; eye2={x:cx+4,y:cy+3}; }

  ctx.beginPath(); ctx.arc(eye1.x, eye1.y, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(eye2.x, eye2.y, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(eye1.x, eye1.y, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(eye2.x, eye2.y, 1.5, 0, Math.PI*2); ctx.fill();

  // Mouth
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  if (mouthOpen) {
    // Open mouth (eating!)
    let mx, my;
    if (dir.x === 1) { mx=cx+4; my=cy+1; }
    else if (dir.x === -1) { mx=cx-4; my=cy+1; }
    else if (dir.y === -1) { mx=cx; my=cy-4; }
    else { mx=cx; my=cy+5; }
    ctx.arc(mx, my, 3, 0, Math.PI*2);
    ctx.fillStyle = '#c0392b';
    ctx.fill();
  } else {
    // Smile
    ctx.arc(cx, cy+3, 4, 0, Math.PI);
    ctx.stroke();
  }

  // Rosy cheeks
  ctx.fillStyle = 'rgba(255,100,100,0.25)';
  ctx.beginPath(); ctx.ellipse(cx-5, cy+3, 4, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+5, cy+3, 4, 3, 0, 0, Math.PI*2); ctx.fill();
}

function gameOver() {
  clearInterval(gameLoop);
  running = false;
  // Show game over overlay
  overlay.innerHTML = `
    <div class="emoji-big">😢</div>
    <h2>Oops!</h2>
    <p>Sam bumped into something!<br>You scored <strong style="color:#ff6b6b">${score}</strong> points! ${score >= 50 ? '⭐ Amazing!' : score >= 20 ? '😊 Good job!' : '👍 Keep trying!'}</p>
    <button id="btn">▶ PLAY AGAIN!</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('btn').addEventListener('click', init);
}

// Keyboard controls
document.addEventListener('keydown', e => {
  if (!running) return;
  const map = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    KeyW:{x:0,y:-1}, KeyS:{x:0,y:1}, KeyA:{x:-1,y:0}, KeyD:{x:1,y:0}
  };
  const d = map[e.code];
  if (d && !(d.x===-dir.x && d.y===-dir.y)) {
    nextDir = d;
    e.preventDefault();
  }
});

// Arrow button controls
function setDir(dx, dy) {
  if (!running) return;
  if (!(dx===-dir.x && dy===-dir.y)) nextDir = {x:dx, y:dy};
}
document.getElementById('btn-up').addEventListener('click', () => setDir(0,-1));
document.getElementById('btn-down').addEventListener('click', () => setDir(0,1));
document.getElementById('btn-left').addEventListener('click', () => setDir(-1,0));
document.getElementById('btn-right').addEventListener('click', () => setDir(1,0));

// Start button
btn.addEventListener('click', init);

// Initial draw
ctx.fillStyle = '#fff9f0';
ctx.fillRect(0,0,canvas.width,canvas.height);
draw();
</script>
</body>
</html>
